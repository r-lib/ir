name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      # No DESCRIPTION in this repo, so list the resolution suite's deps
      # explicitly (overriding the action's default `deps::.`). pak installs
      # them and caches the library across runs.
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::testthat
            any::yaml12
            any::withr
            any::secretbase
      - run: cargo build --verbose
      # With R present the resolution suite (tests/test-resolve.R) runs on every
      # OS, alongside the CLI tests -- including the Windows spawn+wait path,
      # which has no exec equivalent and can't be run locally on Unix.
      - run: cargo test --verbose

  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
