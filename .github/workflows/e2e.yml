name: e2e

# Real end-to-end tests for `ir run`: a fresh R toolchain resolves and installs
# real packages, materialises a library, and runs a script and a Quarto doc.
# Opt-in via IR_E2E; the offline `ci.yml` suite stays the default `cargo test`.
#
# PR1 runs Linux + macOS only. The two Windows-specific bugs (default-R `.bat`
# resolution and `canonicalize` `\\?\` paths) are fixed in a follow-up, which
# also adds a rig-provisioned windows-latest job here.

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  IR_E2E: "1"
  # The version-selection test renders under a non-default R; it must differ
  # from the default below or the test fails loudly as vacuous.
  IR_E2E_R_VERSION: "4.4.3"

jobs:
  e2e:
    name: e2e (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # rig manages the R installs. The default R drives the script test; the
      # --r-version path (and the rig `default`/`binary` lookup) drive the qmd
      # test. No dedicated setup-rig action exists, so install per-OS.
      - name: Install rig (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo curl -L https://rig.r-pkg.org/deb/rig.gpg -o /etc/apt/trusted.gpg.d/rig.gpg
          sudo sh -c 'echo "deb http://rig.r-pkg.org/deb rig main" > /etc/apt/sources.list.d/rig.list'
          sudo apt-get update
          sudo apt-get install -y r-rig

      - name: Install rig (macOS)
        if: runner.os == 'macOS'
        run: |
          brew tap r-lib/rig
          brew install --cask rig

      - name: Install R versions
        run: |
          rig add 4.5.3
          rig add ${{ env.IR_E2E_R_VERSION }}
          rig list
          # rig names installs per-platform (e.g. `4.5-arm64` on macOS arm64),
          # and both `rig default` and `rig run -r` match the name, not the patch
          # version. Resolve the names rig assigned to the two versions.
          default_name=$(rig list --json | jq -r '[.[] | select(.version | startswith("4.5"))][0].name')
          target_name=$(rig list --json | jq -r --arg v "${{ env.IR_E2E_R_VERSION }}" '[.[] | select(.version == $v)][0].name')
          echo "R_DEFAULT_NAME=$default_name" >> "$GITHUB_ENV"
          echo "R_TARGET_NAME=$target_name" >> "$GITHUB_ENV"
          rig default "$default_name"

      # The resolver runs under the selected R and needs renv (>= 1.2 — older
      # renv mishandles PPM dated snapshots) and secretbase; rendering the .qmd
      # needs knitr + rmarkdown. rig installs pak into each R automatically, and
      # pak pulls binaries from PPM (no source builds, and it resolves transitive
      # deps like bslib). jsonlite is the document's own dependency, resolved by
      # ir into the run library.
      - name: Install resolver and render packages
        run: |
          for name in "$R_DEFAULT_NAME" "$R_TARGET_NAME"; do
            rig run -r "$name" -e 'pak::pkg_install(c("renv", "secretbase", "knitr", "rmarkdown"))'
          done

      - uses: quarto-dev/quarto-actions/setup@v2

      - run: cargo build --verbose
      - run: cargo test --test e2e -- --nocapture
